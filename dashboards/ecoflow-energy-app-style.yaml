title: EEC app stijl
views:
  - title: Overzicht
    path: eec-app-style
    icon: mdi:cellphone-dashboard
    cards:
      - type: grid
        columns: 3
        square: false
        cards:
          - type: gauge
            entity: sensor.ecoflow_energy_control_applicatie_opwek_gecorrigeerd
            name: Netto
            min: -4000
            max: 8000
            severity:
              red: -4000
              yellow: 0
              green: 1500
          - type: gauge
            entity: sensor.ecoflow_energy_control_applicatie_stroomprijs_nu
            name: EUR/kWh
            min: -0.2
            max: 0.8
            severity:
              green: -0.2
              yellow: 0.2
              red: 0.35
          - type: gauge
            entity: sensor.ecoflow_energy_control_applicatie_zon_24_uur
            name: Zon 24u
            min: 0
            max: 7000
            severity:
              red: 0
              yellow: 1500
              green: 3500

      - type: custom:auto-entities
        card:
          type: grid
          title: EcoFlow
          columns: 2
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: battery
                eec_sensor_role: soc
              options:
                type: gauge
                min: 0
                max: 100
                severity:
                  red: 0
                  yellow: 30
                  green: 60
            - attributes:
                eec_device_type: battery
                eec_sensor_role: available_kwh
              options:
                type: gauge
                min: 0
                max: 10
                severity:
                  red: 0
                  yellow: 2.5
                  green: 6
            - attributes:
                eec_device_type: battery
                eec_sensor_role: available_eur
              options:
                type: entity
            - attributes:
                eec_device_type: powerstream
                eec_sensor_role: power
              options:
                type: gauge
                min: 0
                max: 800
                severity:
                  green: 0
                  yellow: 300
                  red: 650
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: EcoFlow bediening
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: powerstream
                eec_sensor_role: powerstream_setpoint
            - attributes:
                eec_device_type: powerstream
                eec_sensor_role: group_strategy
            - attributes:
                eec_device_type: powerstream
                eec_sensor_role: group_action
        sort:
          method: name

      - type: entities
        title: HomeWizard
        show_header_toggle: false
        entities:
          - entity: sensor.ecoflow_energy_control_applicatie_homewizard_opwek_ruw
            name: Ruw
          - entity: sensor.ecoflow_energy_control_applicatie_powerstream_teruglevering
            name: Accu terug
          - entity: sensor.ecoflow_energy_control_applicatie_opwek_gecorrigeerd
            name: Netto

      - type: custom:auto-entities
        card:
          type: history-graph
          title: HomeWizard live
          hours_to_show: 12
        filter:
          include:
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: power
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: phase_power
        sort:
          method: name

      - type: entities
        title: Weer
        show_header_toggle: false
        entities:
          - entity: sensor.ecoflow_energy_control_applicatie_zon_nu
            name: Nu
          - type: attribute
            entity: sensor.ecoflow_energy_control_applicatie_zon_nu
            attribute: weather_label
            name: Verwachting
          - type: attribute
            entity: sensor.ecoflow_energy_control_applicatie_zon_nu
            attribute: temperature
            name: Temperatuur
          - entity: sensor.ecoflow_energy_control_applicatie_zon_4_uur
            name: 4u
          - entity: sensor.ecoflow_energy_control_applicatie_zon_12_uur
            name: 12u
          - entity: sensor.ecoflow_energy_control_applicatie_zon_24_uur
            name: 24u
          - entity: sensor.ecoflow_energy_control_applicatie_verwachte_besparing
            name: Besparing

      - type: markdown
        title: Komende uren
        content: >
          {{ state_attr('sensor.ecoflow_energy_control_applicatie_zon_nu',
          'icon_summary') }}

      - type: custom:apexcharts-card
        header:
          show: true
          title: Weer - temperatuur 24 uur
        graph_span: 24h
        apex_config:
          chart:
            height: 220
          plotOptions:
            bar:
              columnWidth: 70%
          dataLabels:
            enabled: false
          yaxis:
            title:
              text: °C
          xaxis:
            labels:
              datetimeFormatter:
                hour: HH:mm
        series:
          - entity: sensor.ecoflow_energy_control_applicatie_zon_nu
            name: °C
            type: column
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const rows = entity.attributes.hourly || [];
              return rows
                .map((item) => [new Date(item.start).getTime(), Number(item.temperature)])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);
