# EEC app dashboard yaml version: 0.5.271
title: EEC app
views:
  - title: Main
    path: ecoflow-energy
    icon: mdi:view-dashboard
    cards:
      - type: custom:auto-entities
        card:
          type: grid
          title: Flow
          columns: 5
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_main_summary
              options:
                type: tile
                name: Main
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_insight_state
              options:
                type: tile
                name: Inzicht
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_live_validation
              options:
                type: tile
                name: Live
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_energy_flow
              options:
                type: tile
                name: Stroom
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_control_verdict
              options:
                type: tile
                name: Nu
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_value_rate
              options:
                type: gauge
                name: EUR/u
                min: -1
                max: 1
                severity:
                  red: -1
                  yellow: 0
                  green: 0.2
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_next_step
              options:
                type: tile
                name: Stap
            - attributes:
                eec_device_type: control
                eec_sensor_role: global_strategy
              options:
                type: tile
                name: Scenario
            - attributes:
                eec_device_type: control
                eec_sensor_role: test_mode
              options:
                type: tile
                name: Test
            - attributes:
                eec_device_type: action
                eec_sensor_role: apply_best_scenario
              options:
                type: button
                name: Advies
                icon: mdi:play
                show_state: false

      - type: custom:auto-entities
        card:
          type: grid
          title: Basis
          columns: 6
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: solar
                eec_sensor_role: corrected_power
              options:
                type: gauge
                name: Netto W
                min: -4000
                max: 8000
                severity:
                  red: -4000
                  yellow: 0
                  green: 1000
            - attributes:
                eec_device_type: solar
                eec_sensor_role: grid_flow_state
              options:
                type: entity
                name: Net
            - attributes:
                eec_device_type: solar
                eec_sensor_role: grid_status
              options:
                type: entity
                name: P1
            - attributes:
                eec_device_type: solar
                eec_sensor_role: grid_power
              options:
                type: gauge
                name: P1 W
                min: -12000
                max: 12000
                severity:
                  green: -12000
                  yellow: 0
                  red: 6000
            - attributes:
                eec_device_type: price
                eec_sensor_role: price_now
              options:
                type: gauge
                name: EUR/kWh
                min: -0.2
                max: 0.8
                severity:
                  green: -0.2
                  yellow: 0.2
                  red: 0.35
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_soc
              options:
                type: gauge
                name: Accu
                min: 0
                max: 100
                severity:
                  red: 0
                  yellow: 30
                  green: 60
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_available_kwh
              options:
                type: gauge
                name: kWh
                min: 0
                max: 16
                severity:
                  red: 0
                  yellow: 4
                  green: 9
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_charge_w
              options:
                type: gauge
                name: Accu in
                min: 0
                max: 4000
                severity:
                  green: 0
                  yellow: 1000
                  red: 2500
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_discharge_w
              options:
                type: gauge
                name: Accu uit
                min: 0
                max: 4000
                severity:
                  green: 0
                  yellow: 1000
                  red: 2500
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_net_w
              options:
                type: gauge
                name: Accu netto
                min: -4000
                max: 4000
                severity:
                  red: -4000
                  yellow: 0
                  green: 500
            - attributes:
                eec_device_type: solar
                eec_sensor_role: powerstream_export
              options:
                type: gauge
                name: Terug W
                min: 0
                max: 1800
                severity:
                  green: 0
                  yellow: 600
                  red: 1200
            - attributes:
                eec_device_type: weather
                eec_sensor_role: expected_savings
              options:
                type: entity
                name: Zon EUR
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: decision_context
              options:
                type: entity
                name: Context

      - type: custom:auto-entities
        card:
          type: grid
          title: Scenario - nu
          columns: 4
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_scenario_overview
              options:
                type: tile
                name: Overzicht
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_scenario_plan
              options:
                type: entity
                name: Plan
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_action_state
              options:
                type: entity
                name: Uitvoerbaar
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_confidence_score
              options:
                type: gauge
                name: Zeker
                min: 0
                max: 100
                severity:
                  red: 0
                  yellow: 60
                  green: 85
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_measurement_state
              options:
                type: entity
                name: Meting
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_next_command
              options:
                type: entity
                name: Volgende

      - type: custom:auto-entities
        show_empty: false
        card:
          type: grid
          title: Smart Plugs
          columns: 2
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: smart_plug
                eec_sensor_role: smart_plug_control
              options:
                type: tile
                name: Plug
            - attributes:
                eec_device_type: smart_plug
                eec_sensor_role: api_status
              options:
                type: entity
                name: Schema

      - type: custom:auto-entities
        card:
          type: grid
          title: Controle
          columns: 6
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_overview
              options:
                type: entity
                name: Overzicht
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_setup
              options:
                type: entity
                name: Setup
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_setup_progress
              options:
                type: gauge
                name: Setup %
                min: 0
                max: 100
                severity:
                  red: 0
                  yellow: 60
                  green: 90
            - attributes:
                eec_device_type: control
                eec_sensor_role: app_status
              options:
                type: entity
                name: Status
            - attributes:
                eec_device_type: control
                eec_sensor_role: app_version
              options:
                type: entity
                name: Versie
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_yaml_version
              options:
                type: tile
                name: YAML
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_source_summary
              options:
                type: entity
                name: Bronnen
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_problem
              options:
                type: entity
                name: Aandacht
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_live_proof
              options:
                type: entity
                name: Bewijs
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_readiness_score
              options:
                type: gauge
                name: Score
                min: 0
                max: 100
                severity:
                  red: 0
                  yellow: 60
                  green: 90
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_ready_state
              options:
                type: entity
                name: Klaar
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_flow_phase
              options:
                type: entity
                name: Fase

      - type: custom:auto-entities
        card:
          type: entities
          title: Waarom
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_start_state
              options:
                name: Start
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_start_reason
              options:
                name: Waarom start
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_auto_mode
              options:
                name: Auto
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: decision_context
              options:
                name: Waarom
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_execution_plan
              options:
                name: Uitvoerplan
            - attributes:
                eec_device_type: control
                eec_sensor_role: execution_status
              options:
                name: Sturing
            - attributes:
                eec_device_type: control
                eec_sensor_role: last_action
              options:
                name: Laatste actie

      - type: custom:auto-entities
        card:
          type: grid
          title: Datacheck
          columns: 4
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_check
              options:
                type: tile
        sort:
          method: attribute
          attribute: check_key

      - type: custom:auto-entities
        show_empty: false
        card:
          type: grid
          title: P1 historie
          columns: 3
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: p1_history
                period: today
              options:
                type: gauge
                name: Dag
                min: -40
                max: 80
                severity:
                  green: -40
                  yellow: 0
                  red: 40
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: p1_history
                period: week
              options:
                type: gauge
                name: Week
                min: -200
                max: 400
                severity:
                  green: -200
                  yellow: 0
                  red: 200
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: p1_history
                period: month
              options:
                type: gauge
                name: Maand
                min: -800
                max: 1600
                severity:
                  green: -800
                  yellow: 0
                  red: 800

      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          title: Scenario hulp
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_strategy_guide
              options:
                name: Strategie hulp

      - type: custom:auto-entities
        card:
          type: grid
          title: Handmatig - tools
          columns: 3
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: action
                eec_sensor_role: apply_strategy
              options:
                type: button
                name: Start
                icon: mdi:play-circle
                show_state: false
            - attributes:
                eec_device_type: action
                eec_sensor_role: check_ecoflow_api
              options:
                type: button
                name: EcoFlow
                icon: mdi:cloud-check
                show_state: false
            - attributes:
                eec_device_type: action
                eec_sensor_role: refresh_prices
              options:
                type: button
                name: Prijzen
                icon: mdi:currency-eur
                show_state: false
