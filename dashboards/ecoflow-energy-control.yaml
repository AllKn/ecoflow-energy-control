title: EEC app
views:
  - title: Energie
    path: ecoflow-energy
    icon: mdi:home-lightning-bolt
    cards:
      - type: entities
        title: EEC app - instellingen
        entities:
          - entity: select.ecoflow_energy_control_applicatie_strategie
            name: Strategie
          - entity: switch.ecoflow_energy_control_applicatie_testmodus
            name: Testmodus
          - entity: sensor.ecoflow_energy_control_applicatie_versie
            name: Versie
          - entity: sensor.ecoflow_energy_control_applicatie_status
            name: Status
          - entity: sensor.ecoflow_energy_control_applicatie_laatste_actie
            name: Laatste actie

      - type: grid
        title: EEC app - acties
        columns: 3
        square: false
        cards:
          - type: button
            entity: button.ecoflow_energy_control_applicatie_ecoflow_api_controleren
            name: EcoFlow API
            icon: mdi:cloud-check
            show_state: false
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.ecoflow_energy_control_applicatie_ecoflow_api_controleren
          - type: button
            entity: button.ecoflow_energy_control_applicatie_epex_prijzen_ophalen
            name: Prijzen ophalen
            icon: mdi:currency-eur
            show_state: false
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.ecoflow_energy_control_applicatie_epex_prijzen_ophalen
          - type: button
            entity: button.ecoflow_energy_control_applicatie_strategie_nu_toepassen
            name: Strategie starten
            icon: mdi:play-circle
            show_state: false
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.ecoflow_energy_control_applicatie_strategie_nu_toepassen

      - type: custom:auto-entities
        card:
          type: entities
          title: EEC app - apparaatstatus
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_sensor_role: api_status
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: EEC app - batterijen
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: battery
          exclude:
            - attributes:
                eec_sensor_role: api_status
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: history-graph
          title: Batterijvermogen - 24 uur
          hours_to_show: 24
        filter:
          include:
            - attributes:
                eec_device_type: battery
                eec_sensor_role: net_power
            - attributes:
                eec_device_type: battery
                eec_sensor_role: charge_power
            - attributes:
                eec_device_type: battery
                eec_sensor_role: discharge_power
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: PowerStream + Delta Pro sturing
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: powerstream
          exclude:
            - attributes:
                eec_sensor_role: api_status
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: history-graph
          title: PowerStreams - 24 uur
          hours_to_show: 24
        filter:
          include:
            - attributes:
                eec_device_type: powerstream
                eec_sensor_role: power
        sort:
          method: name

      - type: gauge
        entity: sensor.ecoflow_energy_control_applicatie_stroomprijs_nu
        name: Prijs nu
        min: -0.2
        max: 0.8

      - type: custom:apexcharts-card
        header:
          show: true
          title: Uurtarieven - komende 24 uur
          show_states: true
        graph_span: 24h
        now:
          show: true
          label: Nu
        apex_config:
          plotOptions:
            bar:
              columnWidth: 80%
          xaxis:
            labels:
              datetimeFormatter:
                hour: HH:mm
        series:
          - entity: sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
            name: EUR/kWh
            type: column
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const prices = entity.attributes.prices || [];
              return prices
                .map((item) => [new Date(item.start).getTime(), Number(item.price)])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);
          - entity: sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
            name: Laagste
            type: line
            stroke_width: 2
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const source = hass.states['sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen'];
              const prices = source ? source.attributes.prices || [] : [];
              const value = Number(entity.state);
              if (!Number.isFinite(value)) return [];
              return prices
                .map((item) => [new Date(item.start).getTime(), value])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);
          - entity: sensor.ecoflow_energy_control_applicatie_hoogste_prijs_tot_morgen
            name: Hoogste
            type: line
            stroke_width: 2
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const source = hass.states['sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen'];
              const prices = source ? source.attributes.prices || [] : [];
              const value = Number(entity.state);
              if (!Number.isFinite(value)) return [];
              return prices
                .map((item) => [new Date(item.start).getTime(), value])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);

      - type: entities
        title: Prijsgrenzen
        entities:
          - sensor.ecoflow_energy_control_applicatie_goedkope_prijsgrens
          - sensor.ecoflow_energy_control_applicatie_dure_prijsgrens
          - sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
          - sensor.ecoflow_energy_control_applicatie_hoogste_prijs_tot_morgen

      - type: gauge
        entity: sensor.ecoflow_energy_control_applicatie_opwek_gecorrigeerd
        name: Netto zon/verbruik
        min: -4000
        max: 8000
        severity:
          red: -4000
          yellow: 0
          green: 1000

      - type: entities
        title: Opwekcorrectie
        entities:
          - sensor.ecoflow_energy_control_applicatie_homewizard_opwek_ruw
          - sensor.ecoflow_energy_control_applicatie_powerstream_teruglevering
          - sensor.ecoflow_energy_control_applicatie_opwek_gecorrigeerd
          - sensor.ecoflow_energy_control_applicatie_sma_totaal_vermogen

      - type: custom:auto-entities
        card:
          type: entities
          title: EEC app - HomeWizard meters
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: homewizard
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: history-graph
          title: HomeWizard vermogen - 24 uur
          hours_to_show: 24
        filter:
          include:
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: power
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: phase_power
        sort:
          method: name
