# EEC app dashboard yaml version: 0.5.273
title: Ecoflow app [0.5.273]
views:
  - title: Main [0.5.273]
    path: ecoflow-energy
    icon: mdi:view-dashboard
    cards:
      - type: custom:auto-entities
        card:
          type: entities
          title: Flow
          show_header_toggle: false
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_main_summary
              options:
                name: Hoofdstatus
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_insight_state
              options:
                name: Inzicht
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_live_validation
              options:
                name: Live validatie
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_energy_flow
              options:
                name: Energieflow
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_control_verdict
              options:
                name: Besluit
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_value_rate
