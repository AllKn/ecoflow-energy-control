title: EEC app scenario's
views:
  - title: Scenario's
    path: eec-scenarios
    icon: mdi:chart-timeline-variant
    cards:
      - type: entities
        title: Simulatie
        entities:
          - entity: sensor.ecoflow_energy_control_applicatie_versie
            name: Versie
          - entity: sensor.ecoflow_energy_control_applicatie_stroomprijs_nu
            name: Prijs nu
          - entity: sensor.ecoflow_energy_control_applicatie_opwek_gecorrigeerd
            name: Netto zon/verbruik
          - entity: sensor.ecoflow_energy_control_applicatie_status
            name: Status

      - type: custom:auto-entities
        card:
          type: entities
          title: Live scenario acties
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_action
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_power
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_eur_per_hour
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: history-graph
          title: Scenario resultaat live - EUR per uur
          hours_to_show: 24
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_eur_per_hour
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: history-graph
          title: Scenario vermogen - 24 uur
          hours_to_show: 24
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_power
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: Besparing/winst vandaag
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_day_eur
        sort:
          method: state
          numeric: true
          reverse: true

      - type: custom:auto-entities
        card:
          type: entities
          title: Besparing/winst deze week
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_week_eur
        sort:
          method: state
          numeric: true
          reverse: true

      - type: custom:auto-entities
        card:
          type: entities
          title: Besparing/winst deze maand
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_month_eur
        sort:
          method: state
          numeric: true
          reverse: true

      - type: custom:apexcharts-card
        header:
          show: true
          title: Uurtarieven - komende 24 uur
          show_states: true
        graph_span: 24h
        now:
          show: true
          label: Nu
        apex_config:
          plotOptions:
            bar:
              columnWidth: 80%
          xaxis:
            labels:
              datetimeFormatter:
                hour: HH:mm
        series:
          - entity: sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
            name: EUR/kWh
            type: column
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const prices = entity.attributes.prices || [];
              return prices
                .map((item) => [new Date(item.start).getTime(), Number(item.price)])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);
