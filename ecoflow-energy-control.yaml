# EEC app dashboard yaml version: 0.5.285
title: Ecoflow app [0.5.285]
views:
  - title: Main [0.5.285]
    path: ecoflow-energy
    icon: mdi:view-dashboard
    cards:
      - type: markdown
        content: |
          ## Snelstart
          De flow is bedoeld voor één doorklik: **Flow** → **Basis** → **Scenario - uitvoering** → **Controle**.

          - **Flow**: bepaalt klaarheid, scenario en gewenste actie.
          - **Basis**: laat de live kernwaarden zien waar de sturing op is gebaseerd.
          - **Scenario - uitvoering**: toont of het gekozen scenario nu echt uitvoerbaar is.
          - **Controle**: verklaart waarom iets wel of niet gebeurt.

          Alles hieronder is met minimale achtergrondkennis te volgen.

      - type: markdown
        content: |
          ## Flow
          Dit is de primaire route voor bediening.  
          De eerste kaartregel laat de kernstatus zien, daarna de controleacties als losse leesbare regels.
      - type: custom:auto-entities
        card:
          type: entities
          title: Flow kern
          show_header_toggle: false
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_main_summary
              options:
                name: Hoofdstatus
                icon: mdi:home-analytics
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_insight_state
              options:
                name: Inzicht
                icon: mdi:lightbulb-on-outline
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_live_validation
              options:
                name: Live
                icon: mdi:shield-check
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_energy_flow
              options:
                name: Stroom
                icon: mdi:transmission-tower
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_control_verdict
              options:
                name: Besluit
                icon: mdi:target

      - type: markdown
        content: |
          <span title="Nu: mag het systeem nu sturen of wacht het op bron/voorwaarden?">Nu</span> |
          <span title="Scenario: welke strategie is actief voor dit moment.">Scenario</span> |
          <span title="Volgende stap: welke actie hoort nu logisch te volgen.">Volgende stap</span> |
          <span title="Advies: start het beste scenario wanneer dit kan.">Advies</span> |
          <span title="Testmodus: uitzetten voordat echte sturing start.">Test</span>
      - type: custom:auto-entities
        card:
          type: entities
          title: Waarde nu
          show_header_toggle: false
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_value_rate
              options:
                name: EUR/u
                icon: mdi:currency-eur
      - type: custom:auto-entities
        card:
          type: entities
          title: Flow actie
          show_header_toggle: false
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_next_step
              options:
                name: Volgende stap
                icon: mdi:arrow-right-bold-circle
            - attributes:
                eec_device_type: control
                eec_sensor_role: global_strategy
              options:
                name: Scenario
                icon: mdi:auto-fix
            - attributes:
                eec_device_type: control
                eec_sensor_role: test_mode
              options:
                name: Test
                icon: mdi:test-tube
      - type: custom:auto-entities
        card:
          type: button
          show_name: true
          show_state: false
          show_icon: true
        card_param: entity
        filter:
          include:
            - attributes:
                eec_device_type: action
                eec_sensor_role: apply_best_scenario
              options:
                name: Advies starten
                icon: mdi:play

      - type: markdown
        content: |
          ## Basis
          Kernwaarden eerst: net/energiestroom, batterijstaat en teruglevering.
      - type: markdown
        content: |
          <span title="Positieve waarde: meer verbruik uit het net. Negatief: levering aan het net.">P1 vermogen</span> en
          <span title="Correctie van netto balans na afname/teruglevering van PowerStreams.">Netto W</span> bepalen de basisbalans.
      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Net & balans
        filter:
          include:
            - attributes:
                eec_device_type: solar
                eec_sensor_role: corrected_power
              options:
                name: Netto W
                icon: mdi:transmission-tower
            - attributes:
                eec_device_type: solar
                eec_sensor_role: grid_flow_state
              options:
                name: Netto stroom
                icon: mdi:home-import-outline
            - attributes:
                eec_device_type: solar
                eec_sensor_role: grid_status
              options:
                name: P1 status
                icon: mdi:home-lightning-bolt-outline
            - attributes:
                eec_device_type: solar
                eec_sensor_role: grid_power
              options:
                name: P1 vermogen
                icon: mdi:flash

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Prijs & zon
        filter:
          include:
            - attributes:
                eec_device_type: price
                eec_sensor_role: price_now
              options:
                name: EUR/kWh nu
                icon: mdi:cash-fast
            - attributes:
                eec_device_type: weather
                eec_sensor_role: expected_savings
              options:
                name: Zonvoordeel
                icon: mdi:sun-snowflake
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: decision_context
              options:
                name: Context
                icon: mdi:information-slab-circle-outline

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Accu
        filter:
          include:
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_soc
              options:
                name: Accu %
                icon: mdi:battery-80
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_available_kwh
              options:
                name: Beschikbaar kWh
                icon: mdi:home-battery
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_charge_w
              options:
                name: Accu laadt
                icon: mdi:arrow-up-bold
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_discharge_w
              options:
                name: Accu ontlaadt
                icon: mdi:arrow-down-bold
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_net_w
              options:
                name: Accu netto
                icon: mdi:sync
            - attributes:
                eec_device_type: solar
                eec_sensor_role: powerstream_export
              options:
                name: Teruglevering
                icon: mdi:export

      - type: markdown
        content: |
          ## Scenario - uitvoering
          Uitvoerbaar én leesbaar: één blok voor de actie en één korte statussamenvatting.
      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Scenario-beeld
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_scenario_overview
              options:
                name: Overzicht
                icon: mdi:clipboard-list
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_scenario_plan
              options:
                name: Plan
                icon: mdi:map-marker-path
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_action_state
              options:
                name: Uitvoerbaar
                icon: mdi:check-decagram
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_measurement_state
              options:
                name: Meting
                icon: mdi:chart-bell-curve-cumulative
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_next_command
              options:
                name: Volgende commando
                icon: mdi:play-circle
      - type: markdown
        content: |
          Smart Plug is onderdeel van de sturende ketting; dit is de actuele verbindingstoestand.
      - type: custom:auto-entities
        card:
          type: entities
          title: Smart Plug
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: smart_plug
                eec_sensor_role: smart_plug_control
              options:
                name: Smart Plug
                icon: mdi:power-plug
            - attributes:
                eec_device_type: smart_plug
                eec_sensor_role: api_status
              options:
                name: Smart Plug API
                icon: mdi:cloud-check
      - type: custom:auto-entities
        card:
          type: entities
          title: Zekerheid
          show_header_toggle: false
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_confidence_score
              options:
                name: Zekerheid
                icon: mdi:target

      - type: markdown
        content: |
          ## Controle & diagnose
          Lees eerst hier: setup, bronnen, waarschuwingen en bewijsketen.
      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Controle kern
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_overview
              options:
                name: Overzicht
                icon: mdi:view-dashboard
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_setup
              options:
                name: Setup
                icon: mdi:cog-transfer
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_setup_progress
              options:
                name: Setup %
                icon: mdi:progress-check
            - attributes:
                eec_device_type: control
                eec_sensor_role: app_status
              options:
                name: App status
                icon: mdi:application-cog
            - attributes:
                eec_device_type: control
                eec_sensor_role: app_version
              options:
                name: App versie
                icon: mdi:tag
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_yaml_version
              options:
                name: YAML
                icon: mdi:file-document-check
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_source_summary
              options:
                name: Bronnen
                icon: mdi:source-repository
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_problem
              options:
                name: Aandacht
                icon: mdi:alert-circle
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_live_proof
              options:
                name: Bewijs
                icon: mdi:shield-check-outline
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_readiness_score
              options:
                name: Score
                icon: mdi:gauge
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_ready_state
              options:
                name: Klaar
                icon: mdi:check-bold
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_flow_phase
              options:
                name: Fase
                icon: mdi:progress-check
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_start_state
              options:
                name: Start
                icon: mdi:rocket-launch
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_start_reason
              options:
                name: Waarom start
                icon: mdi:comment-question
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_auto_mode
              options:
                name: Auto
                icon: mdi:robot
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_execution_plan
              options:
                name: Uitvoerplan
                icon: mdi:clipboard-text

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Datacheck
        filter:
          include:
            - attributes:
                eec_device_type: control
                eec_sensor_role: execution_status
              options:
                name: Sturing
                icon: mdi:remote
            - attributes:
                eec_device_type: control
                eec_sensor_role: last_action
              options:
                name: Laatste actie
                icon: mdi:clock-check
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_check
              options:
                name: Datacheck
                icon: mdi:clipboard-check
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_strategy_guide
              options:
                name: Scenario hulp
                icon: mdi:lightbulb-on

      - type: markdown
        content: |
          ## P1-historie
          Als deze rij ontbreekt, is de bronset nog niet beschikbaar of nog niet geïmporteerd.
      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: P1-historie
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: p1_history
                period: today
              options:
                name: P1 dag
                icon: mdi:chart-line
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: p1_history
                period: week
              options:
                name: P1 week
                icon: mdi:chart-bell-curve
            - attributes:
                eec_device_type: homewizard
                eec_sensor_role: p1_history
                period: month
              options:
                name: P1 maand
                icon: mdi:chart-bar

      - type: markdown
        content: |
          ## Handmatig - tools
          Dit is alleen voor diagnose en nood-bediening; reguliere sturing gaat via `Advies starten`.
      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Smart Plug handmatig
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: smart_plug
                eec_sensor_role: smart_plug_control
              options:
                name: Delta Pro laden
                icon: mdi:power-plug-battery
      - type: custom:auto-entities
        card:
          type: button
          show_name: true
          show_state: false
          show_icon: true
        card_param: entity
        filter:
          include:
            - attributes:
                eec_device_type: action
                eec_sensor_role: apply_strategy
              options:
                name: Start
                icon: mdi:play-circle
            - attributes:
                eec_device_type: action
                eec_sensor_role: stop_powerstream_export
              options:
                name: Teruglevering naar 0
                icon: mdi:transmission-tower-off
            - attributes:
                eec_device_type: action
                eec_sensor_role: check_ecoflow_api
              options:
                name: EcoFlow
                icon: mdi:cloud-check
            - attributes:
                eec_device_type: action
                eec_sensor_role: refresh_prices
              options:
                name: Prijzen
                icon: mdi:currency-eur

  - title: Simulatie
    path: scenario-simulatie
    icon: mdi:chart-timeline-variant-shimmer
    cards:
      - type: markdown
        content: |
          ## Simulatie-logboek
          Deze pagina stuurt niets aan. De sensoren hieronder worden bij elke update opnieuw berekend en door Home Assistant bewaard. De dag/week/maand-totalen worden ook in de EEC-opslag bewaard, zodat ze na een update of herstart doorlopen.

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Advies nu
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_scenario_overview
              options:
                name: Beste scenario
                icon: mdi:clipboard-list
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_scenario_plan
              options:
                name: Waarom
                icon: mdi:map-marker-path
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_value_rate
              options:
                name: Waarde EUR/u
                icon: mdi:currency-eur
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_best_power
              options:
                name: Adviesvermogen
                icon: mdi:flash
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_best_day_value
              options:
                name: Dagwaarde
                icon: mdi:cash-clock
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_best_period_value
              options:
                name: D/W/M totaal
                icon: mdi:cash-multiple
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_choice_delta
              options:
                name: Gemiste waarde
                icon: mdi:cash-alert
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_confidence_score
              options:
                name: Zekerheid
                icon: mdi:shield-check

      - type: custom:auto-entities
        card:
          type: history-graph
          title: Beste advies - laatste 72 uur
          hours_to_show: 72
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_value_rate
              options:
                name: Beste EUR/u
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_best_power
              options:
                name: Beste vermogen
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_choice_delta
              options:
                name: Gemiste EUR/u
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_confidence_score
              options:
                name: Zekerheid

      - type: custom:auto-entities
        card:
          type: history-graph
          title: Scenario's - EUR/u
          hours_to_show: 72
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_eur_per_hour

      - type: custom:auto-entities
        card:
          type: history-graph
          title: Scenario's - vermogen
          hours_to_show: 72
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_power

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Scenario-totalen
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_day_eur
              options:
                name: Vandaag
                icon: mdi:calendar-today
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_week_eur
              options:
                name: Week
                icon: mdi:calendar-week
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_month_eur
              options:
                name: Maand
                icon: mdi:calendar-month

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
          title: Scenario-verklaring
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_action
              options:
                name: Actie
                icon: mdi:play-box
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_reason
              options:
                name: Reden
                icon: mdi:comment-text
            - attributes:
                eec_device_type: scenario
                eec_sensor_role: scenario_executable
              options:
                name: Uitvoerbaar
                icon: mdi:check-decagram

      - type: custom:auto-entities
        card:
          type: history-graph
          title: Context - laatste 72 uur
          hours_to_show: 72
        card_param: entities
        filter:
          include:
            - attributes:
                eec_device_type: price
                eec_sensor_role: price_now
              options:
                name: Prijs
            - attributes:
                eec_device_type: solar
                eec_sensor_role: corrected_power
              options:
                name: Netto W
            - attributes:
                eec_device_type: solar
                eec_sensor_role: powerstream_export
              options:
                name: Teruglevering
            - attributes:
                eec_device_type: battery_fleet
                eec_sensor_role: battery_fleet_soc
              options:
                name: Accu %
            - attributes:
                eec_device_type: weather
                eec_sensor_role: weather_solar_4h
              options:
                name: Zon 4u

  - title: Energy
    path: energy
    icon: mdi:lightning-bolt-circle
    cards:
      - type: markdown
        content: |
          ## Energy-overzicht
          Deze pagina volgt de opzet van het Home Assistant Energy-dashboard: eerst de verdeling en bronnen, daarna de P1-livewaarden die EEC gebruikt.

