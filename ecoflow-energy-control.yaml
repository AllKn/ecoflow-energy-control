      - type: custom:apexcharts-card
        header:
          show: true
          title: Uurtarieven - komende 24 uur
          show_states: true
        graph_span: 24h
        now:
          show: true
          label: Nu
        apex_config:
          plotOptions:
            bar:
              columnWidth: 80%
          xaxis:
            labels:
              datetimeFormatter:
                hour: HH:mm
        series:
          - entity: sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
            name: EUR/kWh
            type: column
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const prices = entity.attributes.prices || [];
              return prices
                .map((item) => [new Date(item.start).getTime(), Number(item.price)])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);
          - entity: sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
            name: Laagste
            type: line
            stroke_width: 2
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const prices = entity.attributes.prices || [];
              const value = Number(entity.state);
              if (!Number.isFinite(value)) return [];
              return prices
                .map((item) => [new Date(item.start).getTime(), value])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);
          - entity: sensor.ecoflow_energy_control_applicatie_hoogste_prijs_tot_morgen
            name: Hoogste
            type: line
            stroke_width: 2
            data_generator: |
              const now = Date.now();
              const end = now + 24 * 60 * 60 * 1000;
              const source = hass.states['sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen'];
              const prices = source ? source.attributes.prices || [] : [];
              const value = Number(entity.state);
              if (!Number.isFinite(value)) return [];
              return prices
                .map((item) => [new Date(item.start).getTime(), value])
                .filter((item) => Number.isFinite(item[0]) && Number.isFinite(item[1]))
                .filter((item) => item[0] >= now && item[0] <= end);

