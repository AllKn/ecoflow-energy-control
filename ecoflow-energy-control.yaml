title: EEC app
views:
  - title: Main
    path: ecoflow-energy
    icon: mdi:view-dashboard
    cards:
      - type: custom:auto-entities
        card:
          type: grid
          title: Flow
          columns: 5
          square: false
        card_param: cards
        filter:
          include:
            - attributes:
                eec_device_type: dashboard
                eec_sensor_role: dashboard_readiness_score
              options:
                type: gauge
                name: Data
                min: 0
                max: 100
                severity:
                  red: 0
                  yellow: 60
                  green: 90
