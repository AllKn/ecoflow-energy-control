title: EEC app
views:
  - title: Energie
    path: ecoflow-energy
    icon: mdi:home-lightning-bolt
    cards:
      - type: entities
        title: EEC app - instellingen
        entities:
          - entity: select.ecoflow_energy_control_applicatie_strategie
            name: Strategie
          - entity: switch.ecoflow_energy_control_applicatie_testmodus
            name: Testmodus
          - entity: sensor.ecoflow_energy_control_applicatie_status
            name: Status
          - entity: sensor.ecoflow_energy_control_applicatie_laatste_actie
            name: Laatste actie

      - type: grid
        title: EEC app - acties
        columns: 3
        square: false
        cards:
          - type: button
            entity: button.ecoflow_energy_control_applicatie_ecoflow_api_controleren
            name: EcoFlow API
            icon: mdi:cloud-check
            show_state: false
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.ecoflow_energy_control_applicatie_ecoflow_api_controleren
          - type: button
            entity: button.ecoflow_energy_control_applicatie_epex_prijzen_ophalen
            name: Prijzen ophalen
            icon: mdi:currency-eur
            show_state: false
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.ecoflow_energy_control_applicatie_epex_prijzen_ophalen
          - type: button
            entity: button.ecoflow_energy_control_applicatie_strategie_nu_toepassen
            name: Strategie starten
            icon: mdi:play-circle
            show_state: false
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.ecoflow_energy_control_applicatie_strategie_nu_toepassen

      - type: custom:auto-entities
        card:
          type: entities
          title: EEC app - apparaatstatus
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_sensor_role: api_status
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: EEC app - batterijen
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: battery
          exclude:
            - attributes:
                eec_sensor_role: api_status
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: EEC app - PowerStreams
          show_header_toggle: false
        filter:
          include:
            - attributes:
                eec_device_type: powerstream
          exclude:
            - attributes:
                eec_sensor_role: api_status
        sort:
          method: name

      - type: gauge
        entity: sensor.ecoflow_energy_control_applicatie_stroomprijs_nu
        name: Prijs nu
        min: -0.2
        max: 0.8

      - type: custom:apexcharts-card
        header:
          show: true
          title: Prijzen tot einde morgen
          show_states: true
        graph_span: 36h
        now:
          show: true
          label: Nu
        series:
          - entity: sensor.ecoflow_energy_control_applicatie_stroomprijs_nu
            name: Prijs
            type: column
            data_generator: |
              const prices = entity.attributes.prices || [];
              return prices.map((item) => [new Date(item.start).getTime(), item.price]);
          - entity: sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
            name: Laagste
            type: line
            stroke_width: 2
            data_generator: |
              const source = hass.states['sensor.ecoflow_energy_control_applicatie_stroomprijs_nu'];
              const prices = source ? source.attributes.prices || [] : [];
              const value = entity.state === 'unknown' ? null : Number(entity.state);
              return prices.map((item) => [new Date(item.start).getTime(), value]);
          - entity: sensor.ecoflow_energy_control_applicatie_hoogste_prijs_tot_morgen
            name: Hoogste
            type: line
            stroke_width: 2
            data_generator: |
              const source = hass.states['sensor.ecoflow_energy_control_applicatie_stroomprijs_nu'];
              const prices = source ? source.attributes.prices || [] : [];
              const value = entity.state === 'unknown' ? null : Number(entity.state);
              return prices.map((item) => [new Date(item.start).getTime(), value]);

      - type: entities
        title: Prijsgrenzen
        entities:
          - sensor.ecoflow_energy_control_applicatie_goedkope_prijsgrens
          - sensor.ecoflow_energy_control_applicatie_dure_prijsgrens
          - sensor.ecoflow_energy_control_applicatie_laagste_prijs_tot_morgen
          - sensor.ecoflow_energy_control_applicatie_hoogste_prijs_tot_morgen

      - type: gauge
        entity: sensor.ecoflow_energy_control_applicatie_opwek_gecorrigeerd
        name: Opwek gecorrigeerd
        min: 0
        max: 8000

      - type: entities
        title: Opwekcorrectie
        entities:
          - sensor.ecoflow_energy_control_applicatie_homewizard_opwek_ruw
          - sensor.ecoflow_energy_control_applicatie_powerstream_teruglevering
          - sensor.ecoflow_energy_control_applicatie_opwek_gecorrigeerd
          - sensor.ecoflow_energy_control_applicatie_sma_totaal_vermogen

      - type: custom:auto-entities
        card:
          type: glance
          title: EEC app - HomeWizard meters
          columns: 2
        filter:
          include:
            - attributes:
                eec_device_type: homewizard
        sort:
          method: name
